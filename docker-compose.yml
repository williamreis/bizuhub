# BizuHub - Backend (FastAPI) + Frontend (Next.js) + PostgreSQL
# Uso: cp .env.example .env && defina SECRET_KEY (mín. 32 caracteres)
#       docker compose up -d

services:
  db:
    image: postgres:16-alpine
    container_name: bizuhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bizuhub
      POSTGRES_PASSWORD: bizuhub
      POSTGRES_DB: bizuhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizuhub -d bizuhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bizuhub-backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://bizuhub:bizuhub@db:5432/bizuhub
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: bizuhub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
